name: Daily Code Check

on:
  schedule:
    - cron: '0 5 * * *' # diario (UTC)
  workflow_dispatch:

jobs:
  check-code:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get last commit info
        id: commit
        run: |
          echo "hash=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "message=$(git log -1 --pretty=%s)" >> $GITHUB_OUTPUT
          echo "author=$(git log -1 --pretty=%an)" >> $GITHUB_OUTPUT

      - name: Create daily log
        run: |
          mkdir -p logs
          echo "Date: $(date)" >> logs/daily-check.log
          echo "Last commit: ${{ steps.commit.outputs.hash }}" >> logs/daily-check.log
          echo "Author: ${{ steps.commit.outputs.author }}" >> logs/daily-check.log
          echo "Message: ${{ steps.commit.outputs.message }}" >> logs/daily-check.log
          echo "----------------------------------------" >> logs/daily-check.log

      - name: Commit log
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add logs/daily-check.log
          git commit -m "chore: daily code check log" || echo "No changes to commit"
          git push
